<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>art — vector drawing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none;
      font-family: -apple-system, system-ui, sans-serif;
      background: #ffffff; color: #1f2937;
      -webkit-user-select: none; user-select: none; }
    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ===== 上部バー ===== */
    #topbar { background: #ffffff; border-bottom: 1px solid #e4e4e7;
      padding: 6px 10px; padding-top: calc(6px + env(safe-area-inset-top));
      display: flex; flex-direction: column; gap: 6px; z-index: 10; }
    .row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    button { min-width: 44px; min-height: 44px;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      background: #f4f4f5; color: #1f2937; border: 1px solid #e4e4e7; border-radius: 8px;
      font-size: 13px; padding: 0 10px; touch-action: manipulation; cursor: pointer; }
    button:active { background: #e4e4e7; }
    button.on { background: #2563eb; border-color: #2563eb; color: #fff; }
    button:disabled { opacity: .35; }

    input[type="color"] { width: 40px; height: 40px; border: 1px solid #e4e4e7;
      border-radius: 8px; background: #fff; padding: 2px; }
    input[type="range"] { width: 90px; accent-color: #2563eb; }
    input[type="checkbox"] { width: 20px; height: 20px; accent-color: #2563eb; }
    input[type="number"] { width: 58px; min-height: 40px; background: #fff;
      color: #1f2937; border: 1px solid #e4e4e7; border-radius: 8px;
      font-size: 15px; padding: 0 8px; }
    select { min-height: 40px; background: #fff; color: #1f2937;
      border: 1px solid #e4e4e7; border-radius: 8px; font-size: 13px; padding: 0 6px; }
    .lbl { font-size: 12px; color: #6b7280; }
    .sep { width: 1px; height: 30px; background: #e4e4e7; margin: 0 4px; }
    #size-label { font-size: 13px; color: #6b7280; min-width: 20px; text-align: center; }

    /* スウォッチ */
    #swatches { display: flex; gap: 4px; flex-wrap: wrap; }
    #swatches button { min-width: 30px; min-height: 30px; width: 30px; height: 30px;
      padding: 0; border-radius: 6px; border: 1px solid #d4d4d8; }
    #swatch-add { min-width: 30px; min-height: 30px; padding: 0; }

    /* ===== 中央 3カラム ===== */
    #main { flex: 1; display: flex; min-height: 0; }

    /* 左: ツールレール */
    #tools { width: 88px; flex-shrink: 0; background: #fafafa;
      border-right: 1px solid #e4e4e7; padding: 8px 6px;
      display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    #tools button { width: 100%; min-height: 48px; padding: 0 4px; font-size: 12px; }

    /* 中央: キャンバス */
    #canvas { flex: 1; min-width: 0; touch-action: none; display: block; background: #e8e8ec; }

    /* 右: 機能パネル */
    #side { width: 236px; flex-shrink: 0; background: #fafafa;
      border-left: 1px solid #e4e4e7; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 4px; }
    #side details { border-bottom: 1px solid #ececee; padding-bottom: 8px; }
    #side summary { font-size: 12px; font-weight: 600; color: #6b7280;
      padding: 10px 4px; cursor: pointer; list-style: none; display: flex; align-items: center; }
    #side summary::before { content: "▸"; margin-right: 6px; font-size: 10px; transition: transform .15s; }
    #side details[open] summary::before { transform: rotate(90deg); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
    .grid2 button, .grid3 button { padding: 0 4px; font-size: 12px; }

    /* レイヤー行 */
    #layer-list { display: flex; flex-direction: column-reverse; gap: 4px; margin-bottom: 6px; }
    .layer-row { display: flex; align-items: center; gap: 4px; padding: 4px;
      border-radius: 8px; background: #ffffff; border: 1px solid #e4e4e7; min-height: 48px; }
    .layer-row.active { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb; }
    .layer-row .name { flex: 1; font-size: 13px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .layer-row button { min-width: 34px; min-height: 40px; padding: 0; font-size: 12px; }
    #layer-actions, #artboard-actions { display: flex; gap: 4px; }
    #layer-actions button, #artboard-actions button { flex: 1; }

    .panel-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
    .panel-list button { justify-content: flex-start; text-align: left; }
    .panel-list button.on { background: #eff6ff; border-color: #2563eb; color: #1d4ed8; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div class="row">
        <button id="undo" title="取り消し">↩︎ 戻す</button>
        <button id="redo" title="やり直し">↪︎ 進む</button>
        <span class="sep"></span>
        <span class="lbl">書き出し</span>
        <button id="export-svg">SVG</button>
        <button id="export-png">PNG</button>
        <button id="export-pdf">PDF</button>
        <span class="sep"></span>
        <button id="clear">全消去</button>
      </div>
      <div class="row">
        <span class="lbl">塗り</span>
        <input type="checkbox" id="fill-on" checked />
        <input type="color" id="fill-color" value="#111111" />
        <select id="fill-type" title="塗りの種類">
          <option value="solid">単色</option>
          <option value="linear">線形グラデ</option>
          <option value="radial">円形グラデ</option>
        </select>
        <input type="color" id="fill-color2" value="#0ea5e9" title="グラデ終点色" />
        <span class="sep"></span>
        <span class="lbl">線</span>
        <input type="checkbox" id="stroke-on" />
        <input type="color" id="stroke-color" value="#111111" />
        <input type="number" id="stroke-width" min="0.5" max="100" step="0.5" value="2" title="線幅" />
        <select id="cap" title="線端">
          <option value="round">丸端</option>
          <option value="butt">端なし</option>
          <option value="square">角端</option>
        </select>
        <select id="join" title="角">
          <option value="round">丸角</option>
          <option value="miter">尖角</option>
          <option value="bevel">面取</option>
        </select>
        <span class="lbl">破線</span>
        <input type="checkbox" id="dash" />
        <span class="sep"></span>
        <span class="lbl">不透明度</span>
        <input type="range" id="opacity" min="0" max="100" value="100" />
        <select id="blend" title="描画モード">
          <option value="normal">通常</option>
          <option value="multiply">乗算</option>
          <option value="screen">スクリーン</option>
          <option value="overlay">オーバーレイ</option>
          <option value="darken">比較(暗)</option>
          <option value="lighten">比較(明)</option>
          <option value="difference">差の絶対値</option>
        </select>
        <span class="sep"></span>
        <span class="lbl">ブラシ</span>
        <select id="brush-preset" title="ブラシ種類">
          <option value="standard">標準</option>
          <option value="calligraphy">カリグラフィ</option>
          <option value="ink">インク(万年筆)</option>
          <option value="fude">筆</option>
          <option value="marker">マーカー</option>
          <option value="pencil">鉛筆</option>
          <option value="airbrush">エアブラシ</option>
          <option value="pattern">パターン(点描)</option>
          <option value="spray">スプレー</option>
        </select>
        <input type="range" id="size" min="1" max="60" value="8" />
        <span id="size-label">8</span>
        <span class="lbl">文字</span>
        <input type="number" id="font-size" min="6" max="400" step="1" value="32" />
        <span class="sep"></span>
        <div id="swatches"></div>
        <button id="swatch-add" title="現在の塗り色を登録">＋</button>
      </div>
    </div>

    <div id="main">
      <div id="tools">
        <button data-tool="select">選択</button>
        <button data-tool="direct">ダイレクト</button>
        <button data-tool="brush" class="on">ブラシ</button>
        <button data-tool="eraser">消しゴム</button>
        <button data-tool="pen">ペン</button>
        <button data-tool="text">テキスト</button>
        <button data-tool="rect">長方形</button>
        <button data-tool="ellipse">楕円</button>
        <button data-tool="line">直線</button>
        <button data-tool="polygon">多角形</button>
        <button data-tool="star">星</button>
        <button data-tool="eyedropper">スポイト</button>
      </div>

      <canvas id="canvas"></canvas>

      <div id="side">
        <details open>
          <summary>レイヤー</summary>
          <div id="layer-list"></div>
          <div id="layer-actions">
            <button id="layer-add">＋</button>
            <button id="layer-del">削除</button>
          </div>
        </details>

        <details open>
          <summary>オブジェクト</summary>
          <div class="grid2">
            <button id="act-group">グループ</button>
            <button id="act-ungroup">解除</button>
            <button id="act-dup">複製</button>
            <button id="act-delete">削除</button>
            <button id="act-copy">コピー</button>
            <button id="act-paste">貼付</button>
            <button id="act-mask">マスク</button>
            <button id="symbol-add">シンボル化</button>
          </div>
        </details>

        <details>
          <summary>パスファインダー</summary>
          <div class="grid2">
            <button id="act-unite">合体</button>
            <button id="act-subtract">前面型抜き</button>
            <button id="act-intersect">交差</button>
            <button id="act-exclude">中マド</button>
          </div>
        </details>

        <details>
          <summary>整列・分布</summary>
          <div class="grid3">
            <button id="act-align-l">左</button>
            <button id="act-align-cx">中央</button>
            <button id="act-align-r">右</button>
            <button id="act-align-t">上</button>
            <button id="act-align-cy">中央</button>
            <button id="act-align-b">下</button>
            <button id="act-dist-h">横等分</button>
            <button id="act-dist-v">縦等分</button>
          </div>
        </details>

        <details>
          <summary>変形</summary>
          <div class="grid2">
            <button id="act-flip-h">左右反転</button>
            <button id="act-flip-v">上下反転</button>
            <button id="act-shear-h">シアー横</button>
            <button id="act-shear-v">シアー縦</button>
          </div>
        </details>

        <details>
          <summary>パス</summary>
          <div class="grid2">
            <button id="act-smooth">スムーズ</button>
            <button id="act-simplify">簡略化</button>
            <button id="act-mesh">メッシュ風</button>
            <button id="act-trace">画像トレース</button>
          </div>
          <input type="file" id="trace-file" accept="image/*" hidden />
        </details>

        <details>
          <summary>シンボル</summary>
          <div id="symbol-list" class="panel-list"></div>
        </details>

        <details>
          <summary>アートボード</summary>
          <div id="artboard-list" class="panel-list"></div>
          <div id="artboard-actions">
            <button id="artboard-add">＋</button>
            <button id="artboard-del">削除</button>
            <button id="artboard-export">書出</button>
          </div>
        </details>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
