<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>art — vector drawing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none;
      font-family: -apple-system, system-ui, sans-serif; background: #2a2a2e; color: #ddd;
      -webkit-user-select: none; user-select: none; }
    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ツールバー: iPad の指でも押しやすいサイズ */
    #toolbar { display: flex; align-items: center; gap: 8px; padding: 8px;
      padding-top: calc(8px + env(safe-area-inset-top)); background: #1c1c1f;
      flex-wrap: wrap; z-index: 10; }
    #toolbar button, #toolbar label { min-width: 44px; min-height: 44px;
      display: inline-flex; align-items: center; justify-content: center;
      background: #3a3a3f; color: #ddd; border: none; border-radius: 8px;
      font-size: 15px; padding: 0 12px; touch-action: manipulation; }
    #toolbar button:active { background: #5a5a66; }
    #toolbar button.on { background: #2563eb; color: #fff; }
    #toolbar input[type="color"] { width: 44px; height: 44px; border: none;
      border-radius: 8px; background: none; padding: 0; }
    #toolbar input[type="range"] { width: 100px; }
    #size-label { font-size: 13px; opacity: .7; min-width: 24px; text-align: center; }

    #main { flex: 1; display: flex; min-height: 0; position: relative; }
    #canvas { flex: 1; touch-action: none; display: block; background: #46464c; }

    /* レイヤーパネル */
    #layers { width: 200px; background: #1c1c1f; padding: 8px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px; }
    #layers h3 { font-size: 13px; opacity: .6; font-weight: 600; }
    #layer-list { display: flex; flex-direction: column-reverse; gap: 4px; }
    .layer-row { display: flex; align-items: center; gap: 6px; padding: 6px;
      border-radius: 8px; background: #2e2e33; min-height: 44px; }
    .layer-row.active { outline: 2px solid #2563eb; }
    .layer-row .name { flex: 1; font-size: 14px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .layer-row button { min-width: 36px; min-height: 36px; background: #3a3a3f;
      border: none; border-radius: 6px; color: #ddd; font-size: 14px; }
    #layer-actions { display: flex; gap: 6px; }
    #layer-actions button { flex: 1; min-height: 44px; background: #3a3a3f;
      border: none; border-radius: 8px; color: #ddd; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <input type="color" id="color" value="#111111" title="色" />
      <input type="range" id="size" min="1" max="60" value="8" />
      <span id="size-label">8</span>
      <button id="undo" title="取り消し">↩︎</button>
      <button id="redo" title="やり直し">↪︎</button>
      <button id="export-svg">SVG</button>
      <button id="export-png">PNG</button>
      <button id="clear">全消去</button>
    </div>
    <div id="main">
      <canvas id="canvas"></canvas>
      <div id="layers">
        <h3>レイヤー</h3>
        <div id="layer-list"></div>
        <div id="layer-actions">
          <button id="layer-add">＋</button>
          <button id="layer-del">削除</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
