<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>art — vector drawing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none;
      font-family: -apple-system, system-ui, sans-serif; background: #2a2a2e; color: #ddd;
      -webkit-user-select: none; user-select: none; }
    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ツールバー: iPad の指でも押しやすいサイズ */
    #toolbar { display: flex; flex-direction: column; gap: 6px; padding: 8px;
      padding-top: calc(8px + env(safe-area-inset-top)); background: #1c1c1f; z-index: 10; }
    .row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .row.scroll { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .row.scroll button { flex-shrink: 0; }
    .row button, .row label.chip { min-width: 44px; min-height: 44px;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      background: #3a3a3f; color: #ddd; border: none; border-radius: 8px;
      font-size: 14px; padding: 0 10px; touch-action: manipulation; }
    .row button:active { background: #5a5a66; }
    .row button.on { background: #2563eb; color: #fff; }
    .row input[type="color"] { width: 40px; height: 40px; border: none;
      border-radius: 8px; background: none; padding: 0; }
    .row input[type="range"] { width: 90px; }
    .row input[type="number"] { width: 56px; min-height: 40px; background: #3a3a3f;
      color: #ddd; border: none; border-radius: 8px; font-size: 15px; padding: 0 8px; }
    .row select { min-height: 40px; background: #3a3a3f; color: #ddd; border: none;
      border-radius: 8px; font-size: 14px; padding: 0 6px; }
    .row .lbl { font-size: 12px; opacity: .6; }
    #size-label { font-size: 13px; opacity: .7; min-width: 20px; text-align: center; }
    .sep { width: 1px; height: 32px; background: #3a3a3f; margin: 0 2px; }

    /* スウォッチ */
    #swatches { display: flex; gap: 4px; flex-wrap: wrap; }
    #swatches button { min-width: 32px; min-height: 32px; width: 32px; height: 32px;
      padding: 0; border-radius: 6px; border: 1px solid #555; }

    #main { flex: 1; display: flex; min-height: 0; position: relative; }
    #canvas { flex: 1; min-width: 0; touch-action: none; display: block; background: #46464c; }
    #layers { flex-shrink: 0; }

    /* レイヤーパネル */
    #layers { width: 210px; background: #1c1c1f; padding: 8px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px; }
    #layers h3 { font-size: 13px; opacity: .6; font-weight: 600; }
    #layer-list { display: flex; flex-direction: column-reverse; gap: 4px; }
    .layer-row { display: flex; align-items: center; gap: 4px; padding: 4px;
      border-radius: 8px; background: #2e2e33; min-height: 48px; }
    .layer-row.active { outline: 2px solid #2563eb; }
    .layer-row .name { flex: 1; font-size: 13px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .layer-row button { min-width: 34px; min-height: 40px; background: #3a3a3f;
      border: none; border-radius: 6px; color: #ddd; font-size: 13px; }
    #layer-actions, #artboard-actions { display: flex; gap: 6px; }
    #layer-actions button, #artboard-actions button { flex: 1; min-height: 44px;
      background: #3a3a3f; border: none; border-radius: 8px; color: #ddd; font-size: 14px; }
    .panel-list { display: flex; flex-direction: column; gap: 4px; }
    .panel-list button { min-height: 44px; background: #2e2e33; border: none;
      border-radius: 8px; color: #ddd; font-size: 13px; text-align: left; padding: 0 10px; }
    .panel-list button.on { outline: 2px solid #2563eb; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="row" id="tools">
        <button data-tool="select">選択</button>
        <button data-tool="direct">ダイレクト</button>
        <button data-tool="brush" class="on">ブラシ</button>
        <button data-tool="pen">ペン</button>
        <button data-tool="text">テキスト</button>
        <button data-tool="rect">長方形</button>
        <button data-tool="ellipse">楕円</button>
        <button data-tool="line">直線</button>
        <button data-tool="polygon">多角形</button>
        <button data-tool="star">星</button>
        <button data-tool="eyedropper">スポイト</button>
        <span class="sep"></span>
        <button id="undo" title="取り消し">↩︎</button>
        <button id="redo" title="やり直し">↪︎</button>
        <button id="export-svg">SVG</button>
        <button id="export-png">PNG</button>
        <button id="export-pdf">PDF</button>
        <button id="clear">全消去</button>
      </div>
      <div class="row">
        <span class="lbl">塗り</span>
        <input type="checkbox" id="fill-on" checked />
        <input type="color" id="fill-color" value="#111111" />
        <select id="fill-type" title="塗りの種類">
          <option value="solid">単色</option>
          <option value="linear">線形グラデ</option>
          <option value="radial">円形グラデ</option>
        </select>
        <input type="color" id="fill-color2" value="#0ea5e9" title="グラデ終点色" />
        <span class="lbl">線</span>
        <input type="checkbox" id="stroke-on" />
        <input type="color" id="stroke-color" value="#111111" />
        <span class="lbl">線幅</span>
        <input type="number" id="stroke-width" min="0.5" max="100" step="0.5" value="2" />
        <select id="cap" title="線端">
          <option value="round">丸端</option>
          <option value="butt">端なし</option>
          <option value="square">角端</option>
        </select>
        <select id="join" title="角">
          <option value="round">丸角</option>
          <option value="miter">尖角</option>
          <option value="bevel">面取</option>
        </select>
        <span class="lbl">破線</span>
        <input type="checkbox" id="dash" />
        <span class="lbl">不透明度</span>
        <input type="range" id="opacity" min="0" max="100" value="100" />
        <select id="blend" title="描画モード">
          <option value="normal">通常</option>
          <option value="multiply">乗算</option>
          <option value="screen">スクリーン</option>
          <option value="overlay">オーバーレイ</option>
          <option value="darken">比較(暗)</option>
          <option value="lighten">比較(明)</option>
          <option value="difference">差の絶対値</option>
        </select>
        <span class="lbl">文字</span>
        <input type="number" id="font-size" min="6" max="400" step="1" value="32" />
        <span class="sep"></span>
        <span class="lbl">ブラシ</span>
        <select id="brush-preset" title="ブラシ種類">
          <option value="standard">標準</option>
          <option value="calligraphy">カリグラフィ</option>
          <option value="marker">マーカー</option>
          <option value="pencil">鉛筆</option>
          <option value="pattern">パターン(点描)</option>
        </select>
        <input type="range" id="size" min="1" max="60" value="8" />
        <span id="size-label">8</span>
        <span class="sep"></span>
        <div id="swatches"></div>
        <button id="swatch-add" title="現在の塗り色を登録">＋</button>
      </div>
      <div class="row scroll" id="actions">
        <button id="act-group">グループ</button>
        <button id="act-ungroup">解除</button>
        <span class="sep"></span>
        <button id="act-unite">合体</button>
        <button id="act-subtract">前面型抜き</button>
        <button id="act-intersect">交差</button>
        <button id="act-exclude">中マド</button>
        <span class="sep"></span>
        <button id="act-mask">マスク</button>
        <span class="sep"></span>
        <button id="act-dup">複製</button>
        <button id="act-copy">コピー</button>
        <button id="act-paste">貼付</button>
        <button id="act-delete">削除</button>
        <span class="sep"></span>
        <button id="act-align-l">左揃え</button>
        <button id="act-align-cx">左右中央</button>
        <button id="act-align-r">右揃え</button>
        <button id="act-align-t">上揃え</button>
        <button id="act-align-cy">上下中央</button>
        <button id="act-align-b">下揃え</button>
        <button id="act-dist-h">横等分</button>
        <button id="act-dist-v">縦等分</button>
        <span class="sep"></span>
        <button id="act-flip-h">左右反転</button>
        <button id="act-flip-v">上下反転</button>
        <button id="act-shear-h">シアー横</button>
        <button id="act-shear-v">シアー縦</button>
        <span class="sep"></span>
        <button id="act-smooth">スムーズ</button>
        <button id="act-simplify">簡略化</button>
        <span class="sep"></span>
        <button id="symbol-add">シンボル登録</button>
      </div>
    </div>
    <div id="main">
      <canvas id="canvas"></canvas>
      <div id="layers">
        <h3>レイヤー</h3>
        <div id="layer-list"></div>
        <div id="layer-actions">
          <button id="layer-add">＋</button>
          <button id="layer-del">削除</button>
        </div>
        <h3>シンボル</h3>
        <div id="symbol-list" class="panel-list"></div>
        <h3>アートボード</h3>
        <div id="artboard-list" class="panel-list"></div>
        <div id="artboard-actions">
          <button id="artboard-add">＋</button>
          <button id="artboard-del">削除</button>
          <button id="artboard-export">書出</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
